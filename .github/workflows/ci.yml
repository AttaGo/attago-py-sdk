name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -v --ignore=tests/conformance

  conformance:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"

      - name: Fetch attago-spec
        uses: actions/checkout@v4
        with:
          repository: AttaGo/attago-spec
          path: attago-spec

      - name: Run conformance
        env:
          ATTAGO_BASE_URL: ${{ secrets.ATTAGO_DEV_BASE_URL }}
          ATTAGO_API_KEY: ${{ secrets.ATTAGO_DEV_API_KEY }}
          ATTAGO_SPEC_DIR: ./attago-spec
        run: pytest tests/conformance/ -v -m conformance
